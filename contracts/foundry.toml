[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
fs_permissions = [{ access = "read", path = "./"}]

[fuzz]
runs = 512

[invariant]
runs = 128
depth = 32

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
arbitrum_one = "${ARBITRUM_ONE_RPC}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
arbitrum_one = { key = "${ARBISCAN_API_KEY}", chain = 42161 }
